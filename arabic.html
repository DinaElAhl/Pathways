<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Arabic &amp; Quran Studies — Pathways</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="data-frameworks.js"></script><script src="data-apps.js"></script><script src="data-resources.js"></script>
  <script src="data-apps-stages.js" defer></script><script src="data-frameworks-stages.js" defer></script><script src="data.js"></script>
  <meta property="og:title" content="Arabic & Quran Studies — Pathways"/>
  <meta property="og:description" content="First-class Arabic-as-a-second-language and Quran studies: CEFR-tagged apps, hifz tracker, tajweed, and Islamic studies."/>
  <style>
  .page-hero{padding:clamp(48px,8vw,80px) var(--gutter);text-align:center;
    background:radial-gradient(800px at 80% 0%,rgba(0,194,168,.15),transparent 60%),
    radial-gradient(700px at 0% 100%,rgba(124,92,255,.15),transparent 60%),var(--bg);border-bottom:1px solid var(--border)}
  .page-hero h1{font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);font-weight:700;margin:0 0 .5rem}
  .page-hero h1 em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .page-hero p{color:var(--text-muted);max-width:560px;margin:0 auto}
  .ar-wrap{max-width:var(--max);margin:0 auto;padding:2rem var(--gutter)}
  .ar-section{margin-bottom:2.5rem}
  .ar-section h2{font-family:var(--font-display);font-size:clamp(1.3rem,3vw,1.7rem);font-weight:700;margin:0 0 12px}
  .ar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .ar-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);transition:transform .15s,border-color .15s}
  .ar-card:hover{transform:translateY(-2px);border-color:var(--brand-2)}
  .ar-card h3{font-family:var(--font-display);font-weight:700;font-size:17px;margin:0 0 6px}
  .ar-card p{font-size:14px;color:var(--text-muted);margin:0 0 10px}
  .ar-card .ar-links{display:flex;flex-wrap:wrap;gap:6px}
  .ar-card .ar-links a{display:inline-block;padding:4px 10px;border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none;background:var(--grad-soft);color:var(--brand-1);border:1px solid var(--border);transition:background .12s}
  .ar-card .ar-links a:hover{background:var(--grad);color:#fff;border-color:transparent}
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <script src="nav.js"></script>

  <section class="page-hero" id="main-content">
    <h1>Arabic &amp; <em lang="ar" dir="rtl">&#1575;&#1604;&#1602;&#1585;&#1570;&#1606;</em> Studies</h1>
    <p>First-class treatment for Arabic-as-a-second-language and Quran studies &mdash; with dedicated apps, CEFR-tagged resources, and path templates.</p>
  </section>

  <div class="ar-wrap" id="ar-content"></div>

  <script>
  "use strict";
  (function () {
    if (!window.PW) return;
    var arApps = PW.apps.filter(function(a){ return a.tags && (a.tags.indexOf("arabic")!==-1||a.tags.indexOf("quran")!==-1||a.tags.indexOf("islamic")!==-1); });
    var arRes = PW.resources.filter(function(r){ return r.tags && (r.tags.indexOf("arabic")!==-1||r.tags.indexOf("quran")!==-1||r.tags.indexOf("islamic")!==-1); });
    var cefr = PW.findFramework("cefr-arabic");
    var wrap = document.getElementById("ar-content");
    var html = "";

    if (cefr) {
      html += '<div class="ar-section"><h2>CEFR for Arabic (A1\u2013C2)</h2><p>' + cefr.shortDesc + '</p>';
      if (cefr.pillars && cefr.pillars.length) {
        html += '<div class="ar-grid">' + cefr.pillars.map(function(p) {
          return '<div class="ar-card"><h3>' + p.name + '</h3><p>' + p.desc + '</p></div>';
        }).join("") + '</div>';
      }
      html += '</div>';
    }

    html += '<div class="ar-section"><h2>Apps for Arabic &amp; Quran</h2><div class="ar-grid">' +
      arApps.map(function(a) {
        var link = (a.liveUrl && a.liveUrl !== "#") ? '<a href="' + a.liveUrl + '" target="_blank">Open \u2197</a>' : '';
        return '<div class="ar-card"><h3>' + a.icon + ' ' + a.name + '</h3><p>' + a.desc + '</p>' +
          '<div class="ar-links"><a href="apps.html?id=' + a.id + '">Details</a>' + link + '</div></div>';
      }).join("") + '</div></div>';

    html += '<div class="ar-section"><h2>Resources</h2><div class="ar-grid">' +
      arRes.map(function(r) {
        var dl = (r.downloadUrl && r.downloadUrl !== "#") ? '<a href="' + r.downloadUrl + '" target="_blank">Download \u2197</a>' : '';
        return '<div class="ar-card"><h3>' + r.title + '</h3><p>' + r.desc + '</p>' +
          '<div class="ar-links"><span style="font-size:12px;color:var(--text-muted)">' + r.type + ' \u00b7 ' + r.level + '</span>' + dl + '</div></div>';
      }).join("") + '</div></div>';

    html += '<div class="ar-section" style="text-align:center;padding-top:16px">' +
      '<a class="btn primary" href="curriculum-builder.html" style="margin-right:10px">Build an Arabic Curriculum</a>' +
      '<a class="btn ghost" href="frameworks.html?filter=arabic">All Arabic Frameworks</a></div>';

    wrap.innerHTML = html;
  })();
  </script>
</body>
</html>
