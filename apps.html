<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Apps — Pathways</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="data-frameworks.js"></script>
  <script src="data-apps.js"></script>
  <script src="data-resources.js"></script>
  <script src="data-apps-stages.js"></script>
  <script src="data-frameworks-stages.js"></script>
  <script src="data.js"></script>
  <style>
  .page-hero{padding:clamp(48px,8vw,96px) var(--gutter) clamp(40px,6vw,72px);text-align:center;background:var(--grad-soft);border-bottom:1px solid var(--border)}
  .page-hero h1{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.25rem);font-weight:700;line-height:1.15;margin:0 0 .75rem}
  .page-hero h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .page-hero p{color:var(--text-muted);font-size:clamp(.95rem,2vw,1.1rem);max-width:540px;margin:0 auto}
  .page-wrap{max-width:var(--max);margin:0 auto;padding:2rem var(--gutter)}
  .filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;align-items:center}
  .fpill{padding:.4rem 1rem;border-radius:999px;border:1.5px solid var(--border);background:var(--bg-elev);font-size:.82rem;font-weight:700;color:var(--text-muted);cursor:pointer;transition:.15s}
  .fpill:hover{border-color:var(--brand-1);color:var(--brand-1)}
  .fpill.on{background:var(--grad);color:#fff;border-color:transparent}
  .srch-inp{padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:10px;font-size:.875rem;width:220px;background:var(--bg-elev);color:var(--text);margin-left:auto}
  .srch-inp:focus{border-color:var(--brand-1);outline:none;box-shadow:0 0 0 3px rgba(124,92,255,.12)}
  .app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .app-item{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:border-color .15s}
  .app-item:hover{border-color:var(--border-strong)}
  .app-summary{display:flex;align-items:start;gap:14px;padding:18px;cursor:pointer}
  .app-summary .acc-chevron{flex:none;margin-top:4px;transition:transform .2s}
  .app-open .acc-chevron{transform:rotate(180deg);color:var(--brand-1)}
  .app-icon{font-size:2rem;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--grad-soft);flex:none}
  .app-meta{min-width:0;flex:1}
  .app-name{font-weight:800;font-size:1rem;color:var(--text)}
  .app-tags{display:flex;flex-wrap:wrap;gap:.3rem}
  .app-tag{padding:.12rem .5rem;border-radius:999px;font-size:.72rem;font-weight:700;background:rgba(124,92,255,.1);color:var(--brand-1)}
  .status-live{background:rgba(0,194,168,.12);color:var(--brand-2);font-size:.72rem;font-weight:700;padding:.15rem .5rem;border-radius:999px;margin-left:8px}
  .status-beta{background:rgba(255,122,89,.1);color:var(--accent);font-size:.72rem;font-weight:700;padding:.15rem .5rem;border-radius:999px;margin-left:8px}
  .status-soon{background:var(--grad-soft);color:var(--text-muted);font-size:.72rem;font-weight:700;padding:.15rem .5rem;border-radius:999px;margin-left:8px}
  .app-detail{padding:0 18px 18px;border-top:1px solid var(--border);animation:accFade .2s ease}
  .app-detail h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin:16px 0 8px}
  .app-features,.app-steps{font-size:.85rem;color:var(--text-muted);padding-left:1.2rem;margin:0 0 12px}
  .app-features li,.app-steps li{margin-bottom:4px}
  .app-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
  .count-tag{font-size:.82rem;font-weight:700;color:var(--brand-1)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--text);color:var(--bg);padding:10px 22px;border-radius:999px;font-size:14px;
    font-weight:600;opacity:0;transition:opacity .3s,transform .3s;z-index:999;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <script src="nav.js"></script>

  <section class="page-hero" id="main-content">
    <h1>Every tool a <em>teacher needs</em></h1>
    <p>Built around the E² Framework. Add any app to your learning path.</p>
  </section>

  <div class="page-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span class="count-tag" id="path-counter"></span>
      <span class="count-tag" id="app-count"></span>
    </div>
    <div class="filter-bar" id="app-filters"></div>
    <input class="srch-inp" id="app-search" placeholder="Search apps…" type="search" style="margin-bottom:16px">
    <div class="app-grid" id="app-grid"></div>
  </div>

  <script src="apps-app.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
