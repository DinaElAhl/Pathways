<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps — Pathways</title>
<link rel="stylesheet" href="styles.css">
<style>
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#312e81 100%);color:#fff;padding:3rem 1.5rem;text-align:center}
.hero h1{font-size:clamp(1.75rem,4vw,2.75rem);font-weight:800;margin-bottom:.75rem}
.hero p{font-size:1.1rem;opacity:.9;max-width:560px;margin:0 auto 1.5rem}
.page-wrap{max-width:1280px;margin:0 auto;padding:2rem 1.5rem}
.filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem;align-items:center}
.filter-btn{padding:.4rem 1rem;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-size:.85rem;font-weight:600;color:var(--text-muted);cursor:pointer;transition:.15s}
.filter-btn:hover,.filter-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.search-wrap{position:relative;margin-left:auto}
.search-icon{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);pointer-events:none}
.search-input{padding:.5rem .75rem .5rem 2.2rem;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;width:240px;outline:none;transition:.15s}
.search-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.apps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem}
.app-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.5rem;transition:.2s;display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.app-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.08);border-color:var(--brand)}
.app-icon{font-size:2.25rem;margin-bottom:.75rem;width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:var(--brand-light)}
.app-title{font-weight:800;font-size:1.1rem;margin-bottom:.35rem}
.app-desc{font-size:.875rem;color:var(--text-muted);line-height:1.5;flex:1;margin-bottom:1rem}
.app-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:1rem}
.app-tag{padding:.15rem .55rem;border-radius:999px;font-size:.75rem;font-weight:600;background:#f1f5f9;color:#475569}
.app-footer{display:flex;gap:.5rem;align-items:center;border-top:1px solid var(--border);padding-top:.75rem;margin-top:auto}
.app-status{font-size:.75rem;font-weight:600;padding:.2rem .6rem;border-radius:999px}
.status-live{background:#d1fae5;color:#065f46}
.status-beta{background:#fef3c7;color:#92400e}
.status-soon{background:#f1f5f9;color:#64748b}
.btn-add{margin-left:auto;background:var(--brand);color:#fff;border:none;padding:.4rem .9rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.15s}
.btn-add:hover{background:var(--brand-dark)}
.section-heading{font-size:1.35rem;font-weight:800;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
.section-heading span{color:var(--text-muted);font-size:1rem;font-weight:500}
.no-results{text-align:center;padding:3rem;color:var(--text-muted);grid-column:1/-1}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">🧭 Path<span>ways</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="path-builder.html" class="nav-link">Builder</a>
      <a href="apps.html" class="nav-link active">Apps</a>
      <a href="frameworks.html" class="nav-link">Frameworks</a>
      <a href="resources.html" class="nav-link">Resources</a>
    </div>
    <div class="nav-spacer"></div>
    <a href="path-builder.html" class="nav-cta">Build a Path</a>
  </div>
</nav>

<section class="hero">
  <h1>🛠 Pathways Apps</h1>
  <p>Every tool a teacher needs, built around the E² Framework. Click to add any app directly to your path.</p>
</section>

<div class="page-wrap">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filter('all')">All</button>
    <button class="filter-btn" onclick="filter('planning')">📋 Planning</button>
    <button class="filter-btn" onclick="filter('assessment')">📊 Assessment</button>
    <button class="filter-btn" onclick="filter('engagement')">⚡ Engagement</button>
    <button class="filter-btn" onclick="filter('arabic')">ع Arabic / Quran</button>
    <button class="filter-btn" onclick="filter('languages')">🌐 Languages</button>
    <button class="filter-btn" onclick="filter('pbl')">🚀 PBL</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" placeholder="Search apps…" oninput="renderApps()">
    </div>
  </div>

  <div class="section-heading" id="sectionHeading">All Apps <span id="appCount"></span></div>
  <div class="apps-grid" id="appsGrid"></div>
</div>

<footer style="background:#0f172a;color:#94a3b8;text-align:center;padding:2rem;margin-top:3rem;font-size:.875rem">
  <p>© 2026 Pathways — Built with ❤️ and Claude by Dina El Ahl</p>
  <p style="margin-top:.5rem"><a href="https://github.com/DinaElAhl/Pathways" style="color:#60a5fa">GitHub</a> &bull; <a href="frameworks.html" style="color:#60a5fa">Frameworks</a> &bull; <a href="path-builder.html" style="color:#60a5fa">Builder</a></p>
</footer>

<script>
const APPS = [
  {id:'lesson-loom',title:'LessonLoom',icon:'📝',desc:'AI-powered lesson planner built on the E² 5-part blueprint. Input any topic and get a Hook, Teach, Practice, Connect & Reflect structure in seconds.',tags:['planning','e2','ai'],status:'live',category:'planning',features:['E² blueprint','Differentiation tiers','PDF/Google Docs export','Bloom's alignment']},
  {id:'flip-studio',title:'FlipStudio',icon:'🎬',desc:'Paste any YouTube, website, or PDF link and FlipStudio converts it into a structured flipped lesson with comprehension questions and key vocab.',tags:['video','flipped','ai'],status:'live',category:'engagement',features:['Auto-transcription','Quiz generation','Timestamp markers','Accessibility captions']},
  {id:'rubric-raft',title:'RubricRaft',icon:'📊',desc:'Drag-and-drop rubric builder with QTI export. Create holistic or analytic rubrics aligned to any standard or framework — import from Excel too.',tags:['assessment','rubric','qti'],status:'live',category:'assessment',features:['QTI 2.2 export','Holistic & analytic rubrics','Standard alignment','Peer assessment mode']},
  {id:'quiz-forge',title:'QuizForge',icon:'❓',desc:'Generate quizzes from any text, URL, or document. Multiple question types, auto-grading, and xAPI reporting to your LRS.',tags:['quiz','assessment','ai','xapi'],status:'live',category:'assessment',features:['10 question types','xAPI reporting','AI generation','Adaptive difficulty']},
  {id:'differentiate-it',title:'DifferentiateIt',icon:'🎯',desc:'Paste any task and get three auto-differentiated versions — struggling, on-level, and advanced — all keeping the same learning objective.',tags:['differentiation','udl','accessibility'],status:'live',category:'planning',features:['3 tiers auto-generated','UDL-aligned','Reading level adjustment','Vocabulary scaffolding']},
  {id:'exit-ticket',title:'ExitTicket',icon:'🚪',desc:'Quick formative check-ins that surface understanding in real time. 60-second polls, traffic lights, and open-ended prompts. Works on any device.',tags:['assessment','formative','engagement'],status:'live',category:'assessment',features:['Real-time results','10 prompt types','Class analytics','Anonymous mode']},
  {id:'vocab-vault',title:'VocabVault',icon:'📚',desc:'Spaced-repetition vocabulary sets for any subject. Upload a word list or generate one from a topic. CEFR-tagged for language classes.',tags:['vocabulary','spaced-rep','languages','cefr'],status:'live',category:'languages',features:['SM-2 algorithm','CEFR tagging','Audio pronunciation','Image association']},
  {id:'hifz-helper',title:'HifzHelper',icon:'📿',desc:'Quran memorisation tracker with mutashabihat (similar-verse) hints, murajaah cycles, and ijazah teacher linking. Hafs 'an 'Asim default.',tags:['quran','hifz','arabic','islamic'],status:'live',category:'arabic',features:['Mutashabihat alerts','Murajaah scheduler','Tajweed notes','Progress charts']},
  {id:'arabic-lab',title:'ArabicLab',icon:'ع',desc:'Arabic as a second language (ASL) studio with CEFR A1–C2 tracks, Fusha vs dialect switching, and integrated Al-Arabiyya Bayna Yadayk progression.',tags:['arabic','language','cefr','asl'],status:'live',category:'arabic',features:['CEFR A1–C2','Fusha & dialect','Grammar drills','Speaking practice']},
  {id:'project-pilot',title:'ProjectPilot',icon:'🚀',desc:'Full PBL project planner with timeline, collaboration tools, and a driving-question builder. Aligned to PBL Works Gold Standard.',tags:['pbl','project','collaboration'],status:'beta',category:'pbl',features:['Driving question builder','Milestone tracker','Peer collaboration','Exhibition planner']},
  {id:'timeline-pro',title:'TimelinePro',icon:'📅',desc:'Visual history and sequence timeline builder. Drag events, add images and sources, and embed into any lesson or assessment.',tags:['history','visual','social-studies'],status:'beta',category:'engagement',features:['Drag & drop events','Image embeds','Source citations','Interactive publish']},
  {id:'data-dash',title:'DataDash',icon:'📈',desc:'Student progress analytics across all Pathways apps. Track class trends, identify struggling students early, and generate parent-friendly reports.',tags:['analytics','data','reporting'],status:'beta',category:'assessment',features:['Cross-app analytics','Early warning alerts','Parent reports','Bloom's distribution']},
  {id:'lesson-loom-arabic',title:'LessonLoom Arabic',icon:'📝',desc:'Arabic-language version of LessonLoom for content-area teaching in Arabic. Supports RTL layout and all major Arab world curricula.',tags:['arabic','planning','e2'],status:'soon',category:'arabic',features:['RTL interface','Arab curricula aligned','Arabic AI generation','Islamic calendar']},
  {id:'read-aloud',title:'ReadAloud Studio',icon:'🔊',desc:'Text-to-speech studio with natural-language Arabic and English voices. Uploads text or pastes from any app; exports as MP3 or embeds inline.',tags:['accessibility','udl','languages'],status:'soon',category:'languages',features:['Arabic TTS','English TTS','SSML support','Accessibility export']},
  {id:'gamify-it',title:'GamifyIt',icon:'🎮',desc:'Add points, badges, leaderboards, and quests to any Pathways lesson. One click — no coding. Turn mundane drills into classroom competitions.',tags:['gamification','engagement'],status:'soon',category:'engagement',features:['XP & badges','Leaderboard','Quest paths','Classroom teams']},
];

let activeFilter = 'all';

function filter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase().includes(cat==='all'?'all':cat)));
  renderApps();
}

function renderApps() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = APPS.filter(a => {
    const matchesCat = activeFilter === 'all' || a.category === activeFilter || a.tags.includes(activeFilter);
    const matchesQ = !q || a.title.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q) || a.tags.some(t=>t.includes(q));
    return matchesCat && matchesQ;
  });
  document.getElementById('appCount').textContent = filtered.length + ' apps';
  const grid = document.getElementById('appsGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No apps match your search. Try a different filter.</div>';
    return;
  }
  grid.innerHTML = filtered.map(a => `
    <div class="app-card">
      <div class="app-icon">${a.icon}</div>
      <div class="app-title">${a.title}</div>
      <div class="app-desc">${a.desc}</div>
      <div class="app-tags">${a.tags.map(t=>`<span class="app-tag">${t}</span>`).join('')}</div>
      <ul style="font-size:.8rem;color:var(--text-muted);padding-left:1.25rem;margin-bottom:.75rem">${(a.features||[]).map(f=>`<li>${f}</li>`).join('')}</ul>
      <div class="app-footer">
        <span class="app-status ${{live:'status-live',beta:'status-beta',soon:'status-soon'}[a.status]||'status-soon'}">${{live:'● Live',beta:'⚡ Beta',soon:'Coming soon'}[a.status]||'Coming soon'}</span>
        <button class="btn-add" onclick="addToPath('${a.id}','${a.title.replace(/'/g,\"\\\"\")}')">+ Add to Path</button>
      </div>
    </div>
  `).join('');
}

function addToPath(id, title) {
  const draft = JSON.parse(localStorage.getItem('pathways-draft') || '{"nodes":[]}');
  if (!draft.nodes.find(n=>n.id===id)) {
    const app = APPS.find(a=>a.id===id);
    draft.nodes.push({id, title: app.title, desc: app.desc, icon: app.icon, tags: app.tags, nodeType:'app', type:'app'});
    localStorage.setItem('pathways-draft', JSON.stringify(draft));
    alert(title + ' added to your path! Go to the Builder to see it.');
  } else {
    alert(title + ' is already in your path.');
  }
}

renderApps();
</script>
</body>
</html>
