name: Deploy to GitHub Pages + Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site files
        run: |
          mkdir -p _site
          cp *.html *.css *.js _site/
          cp robots.txt sitemap.xml vercel.json _site/ 2>/dev/null || true
          cp -r public/* _site/ 2>/dev/null || true
          # Create clean-URL redirect folders for GitHub Pages
          for page in browse quote about pricing compare arabic curriculum-builder path-builder apps frameworks resources; do
            if [ -f "_site/${page}.html" ] || [ "$page" = "browse" ]; then
              mkdir -p "_site/${page}"
              if [ "$page" = "browse" ]; then
                dest="frameworks.html"
              else
                dest="${page}.html"
              fi
              cat > "_site/${page}/index.html" <<REDIR
<!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=../${dest}"><link rel="canonical" href="../${dest}"></head><body><a href="../${dest}">Redirecting…</a></body></html>
REDIR
            fi
          done
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    if: vars.VERCEL_PROJECT_ID != '' || secrets.VERCEL_TOKEN != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
