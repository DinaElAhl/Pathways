<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources — Pathways</title>
<link rel="stylesheet" href="styles.css">
<style>
.hero{background:linear-gradient(135deg,#064e3b 0%,#065f46 50%,#047857 100%);color:#fff;padding:3rem 1.5rem;text-align:center}
.hero h1{font-size:clamp(1.75rem,4vw,2.75rem);font-weight:800;margin-bottom:.75rem}
.hero p{font-size:1.1rem;opacity:.9;max-width:580px;margin:0 auto 1.5rem}
.page-wrap{max-width:1280px;margin:0 auto;padding:2rem 1.5rem}
.filter-row{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-bottom:2rem}
.pill{padding:.4rem 1rem;border-radius:999px;border:1.5px solid var(--border);background:#fff;font-size:.85rem;font-weight:600;color:var(--text-muted);cursor:pointer;transition:.15s}
.pill.active,.pill:hover{background:#059669;color:#fff;border-color:#059669}
.search-wrap{position:relative;margin-left:auto}
.search-icon{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);pointer-events:none}
.search-inp{padding:.5rem .75rem .5rem 2.2rem;border:1.5px solid var(--border);border-radius:8px;font-size:.875rem;width:260px;outline:none;transition:.15s}
.search-inp:focus{border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,.1)}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem}
.res-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;flex-direction:column}
.res-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.08);border-color:#059669}
.res-thumb{height:8px}
.res-body{padding:1.25rem;flex:1;display:flex;flex-direction:column}
.res-type{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:.4rem}
.res-title{font-weight:800;font-size:.95rem;margin-bottom:.35rem;line-height:1.3}
.res-desc{font-size:.825rem;color:var(--text-muted);line-height:1.5;flex:1;margin-bottom:.75rem}
.res-meta{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}
.meta-tag{padding:.15rem .5rem;border-radius:999px;font-size:.72rem;font-weight:600;background:#f1f5f9;color:#475569}
.res-footer{border-top:1px solid var(--border);padding-top:.75rem;display:flex;align-items:center;gap:.5rem}
.res-level{font-size:.75rem;font-weight:700;padding:.2rem .5rem;border-radius:6px}
.btn-view{margin-left:auto;background:#059669;color:#fff;border:none;padding:.35rem .8rem;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.15s;text-decoration:none;display:inline-block}
.btn-view:hover{background:#047857}
.no-res{text-align:center;padding:3rem;color:var(--text-muted);grid-column:1/-1}
.section-head{font-size:1.35rem;font-weight:800;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
.count-badge{background:#f1f5f9;color:#475569;font-size:.8rem;font-weight:600;padding:.2rem .6rem;border-radius:999px}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">🧭 Path<span>ways</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="path-builder.html" class="nav-link">Builder</a>
      <a href="apps.html" class="nav-link">Apps</a>
      <a href="frameworks.html" class="nav-link">Frameworks</a>
      <a href="resources.html" class="nav-link active">Resources</a>
    </div>
    <div class="nav-spacer"></div>
    <a href="path-builder.html" class="nav-cta">Build a Path</a>
  </div>
</nav>

<section class="hero">
  <h1>📖 Resources Library</h1>
  <p>Curated learning resources, guides, templates, and research — all ready to add to your path.</p>
</section>

<div class="page-wrap">
  <div class="filter-row">
    <button class="pill active" onclick="filter('all')">All</button>
    <button class="pill" onclick="filter('guide')">📋 Guides</button>
    <button class="pill" onclick="filter('template')">📄 Templates</button>
    <button class="pill" onclick="filter('video')">🎬 Videos</button>
    <button class="pill" onclick="filter('research')">🔬 Research</button>
    <button class="pill" onclick="filter('arabic')">ع Arabic &amp; Quran</button>
    <button class="pill" onclick="filter('tool')">🛠 Tools</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="searchRes" placeholder="Search resources…" oninput="renderRes()">
    </div>
  </div>

  <div class="section-head">Resources <span class="count-badge" id="resCount"></span></div>
  <div class="res-grid" id="resGrid"></div>
</div>

<footer style="background:#0f172a;color:#94a3b8;text-align:center;padding:2rem;margin-top:3rem;font-size:.875rem">
  <p>© 2026 Pathways — Built with ❤️ and Claude by Dina El Ahl</p>
  <p style="margin-top:.5rem"><a href="https://github.com/DinaElAhl/Pathways" style="color:#60a5fa">GitHub</a> &bull; <a href="apps.html" style="color:#60a5fa">Apps</a> &bull; <a href="frameworks.html" style="color:#60a5fa">Frameworks</a></p>
</footer>

<script>
const RESOURCES = [
  {id:'e2-guide',title:'E² Teaching Framework — Complete Guide',type:'guide',desc:'The full E² framework documentation: four pillars, five-part lesson blueprint, differentiation strategies, and engagement levers. The official reference for all Pathways tools.',tags:['e2','lesson-design','differentiation'],color:'#7c3aed',level:'All',levelColor:'#ede9fe;color:#6d28d9',cat:'guide'},
  {id:'e2-template',title:'E² 5-Part Lesson Plan Template',type:'template',desc:'A ready-to-use blank lesson plan aligned to Hook → Teach → Practice → Connect → Reflect. Available as Google Doc, Word, and PDF.',tags:['e2','lesson-plan','template'],color:'#7c3aed',level:'All',levelColor:'#ede9fe;color:#6d28d9',cat:'template'},
  {id:'udl-cheat',title:'UDL 3.0 Quick Reference Card',type:'guide',desc:'One-page summary of all UDL 3.0 checkpoints across engagement, representation, and action & expression. Perfect for lesson-planning sessions.',tags:['udl','accessibility','differentiation'],color:'#0891b2',level:'All',levelColor:'#cffafe;color:#0e7490',cat:'guide'},
  {id:'bloom-matrix',title:"Bloom's Taxonomy Question Stems Matrix",type:'template',desc:"Question-stem matrix for all six Bloom's levels across different subjects. Generate assessment items at any cognitive level in seconds.",tags:['bloom','assessment','questioning'],color:'#d97706',level:'All',levelColor:'#fef3c7;color:#92400e',cat:'template'},
  {id:'hifz-tracker',title:'Hifz Progress Tracker (30 Juz)',type:'template',desc:'Printable and digital tracker for Quran memorisation across all 30 Juz. Includes murajaah log and daily target calculator.',tags:['quran','hifz','arabic'],color:'#059669',level:'All',levelColor:'#d1fae5;color:#065f46',cat:'arabic'},
  {id:'tajweed-rules',title:"Tajweed Rules Summary (Hafs 'an 'Asim)",type:'guide',desc:"Visual summary of all major Tajweed rules with audio examples and colour-coded Quran pages. Hafs 'an 'Asim only.",tags:['quran','tajweed','arabic'],color:'#059669',level:'All',levelColor:'#d1fae5;color:#065f46',cat:'arabic'},
  {id:'arabic-cefr',title:'Arabic CEFR Level Descriptors (A1–C2)',type:'guide',desc:'Can-do descriptors for Arabic as a second language, mapped to CEFR levels A1–C2. Distinguishes Fusha from dialect skills.',tags:['arabic','cefr','language'],color:'#16a34a',level:'A1–C2',levelColor:'#d1fae5;color:#065f46',cat:'arabic'},
  {id:'lti-setup',title:'LTI 1.3 Integration Guide',type:'guide',desc:'Step-by-step guide for integrating Pathways apps into Canvas, Moodle, Blackboard, and Google Classroom via LTI 1.3.',tags:['lti','integration','lms'],color:'#4f46e5',level:'Admin',levelColor:'#ede9fe;color:#4338ca',cat:'tool'},
  {id:'xapi-intro',title:'xAPI for Teachers — Plain English',type:'guide',desc:'Non-technical overview of xAPI: what it tracks, why it matters, and how to read data from DataDash. No coding required.',tags:['xapi','data','analytics'],color:'#4f46e5',level:'All',levelColor:'#ede9fe;color:#4338ca',cat:'guide'},
  {id:'pbl-rubric',title:'PBL Gold Standard Rubric',type:'template',desc:'Rubric based on the PBL Works Gold Standard Design Elements. Use in ProjectPilot or print for peer review sessions.',tags:['pbl','rubric','assessment'],color:'#dc2626',level:'Grades 5–12',levelColor:'#fee2e2;color:#b91c1c',cat:'template'},
  {id:'differentiation-menu',title:'Differentiation Menu Templates (3-Tier)',type:'template',desc:'Ready-to-customise three-tier task menus for Maths, English, and Science. Aligned to DifferentiateIt output format.',tags:['differentiation','udl','templates'],color:'#0891b2',level:'All',levelColor:'#cffafe;color:#0e7490',cat:'template'},
  {id:'exit-ticket-bank',title:'Exit Ticket Question Bank (200 prompts)',type:'template',desc:"200 ready-to-use exit ticket prompts across subjects and Bloom's levels. Import directly into ExitTicket app.",tags:['exit-ticket','formative','assessment'],color:'#d97706',level:'All',levelColor:'#fef3c7;color:#92400e',cat:'template'},
  {id:'ferpa-checklist',title:'FERPA Compliance Checklist for EdTech',type:'guide',desc:'Practical checklist for K-12 administrators evaluating edtech tools for FERPA compliance. Includes third-party vendor questions.',tags:['ferpa','compliance','privacy'],color:'#dc2626',level:'Admin',levelColor:'#fee2e2;color:#b91c1c',cat:'guide'},
  {id:'gdpr-k',title:'GDPR-K Student Data Guide',type:'guide',desc:"Plain-language guide for schools on GDPR requirements for student data, including the stricter children's provisions (GDPR-K).",tags:['gdpr','compliance','privacy'],color:'#dc2626',level:'Admin',levelColor:'#fee2e2;color:#b91c1c',cat:'guide'},
  {id:'flipped-video',title:'How to Make a Great Flipped Video',type:'video',desc:'15-minute screencast walking through the FlipStudio workflow: choose a source, auto-generate questions, add timecodes, publish.',tags:['flipped','video','flipstudio'],color:'#ef4444',level:'All',levelColor:'#fee2e2;color:#b91c1c',cat:'video'},
  {id:'e2-research',title:'Research Behind E²: 20 Key Studies',type:'research',desc:'Annotated bibliography of 20 peer-reviewed studies that underpin the E² framework — covering cognitive load, feedback, differentiation, and cultural responsiveness.',tags:['e2','research','evidence'],color:'#6d28d9',level:'Advanced',levelColor:'#ede9fe;color:#6d28d9',cat:'research'},
  {id:'islamic-studies-scope',title:'Islamic Studies Scope & Sequence (K-12)',type:'template',desc:"Full K-12 scope and sequence for Fiqh, Seerah, Aqeedah, Hadith, and Adab — aligned to four Sunni madhahib and Ja'fari. Download or copy to LessonLoom.",tags:['islamic','quran','arabic'],color:'#059669',level:'K–12',levelColor:'#d1fae5;color:#065f46',cat:'arabic'},
  {id:'getting-started',title:'Getting Started with Pathways',type:'guide',desc:'5-minute onboarding guide: create your first path, add apps, export, and share. Includes video walkthrough and FAQ.',tags:['getting-started','onboarding','guide'],color:'#2563eb',level:'All',levelColor:'#dbeafe;color:#1d4ed8',cat:'guide'},
];

let activeFilter = 'all';

function filter(cat) {
  activeFilter = cat;
  document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.textContent.trim().toLowerCase().includes(cat==='all'?'all':cat.replace('ع ','').toLowerCase())));
  renderRes();
}

function renderRes() {
  const q = document.getElementById('searchRes').value.toLowerCase();
  const items = RESOURCES.filter(r => {
    const matchesCat = activeFilter === 'all' || r.cat === activeFilter || r.tags.includes(activeFilter);
    const matchesQ = !q || r.title.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q) || r.tags.some(t=>t.includes(q));
    return matchesCat && matchesQ;
  });
  document.getElementById('resCount').textContent = items.length;
  const grid = document.getElementById('resGrid');
  if (!items.length) { grid.innerHTML='<div class="no-res">No resources match your search.</div>'; return; }
  grid.innerHTML = items.map(r => `
    <div class="res-card">
      <div class="res-thumb" style="background:${r.color}"></div>
      <div class="res-body">
        <div class="res-type">${{'guide':'📋 Guide','template':'📄 Template','video':'🎬 Video','research':'🔬 Research','tool':'🛠 Tool'}[r.type]||r.type}</div>
        <div class="res-title">${r.title}</div>
        <div class="res-desc">${r.desc}</div>
        <div class="res-meta">${r.tags.map(t=>`<span class="meta-tag">${t}</span>`).join('')}</div>
        <div class="res-footer">
          <span class="res-level" style="background:${r.levelColor||'#f1f5f9;color:#475569'}">${r.level||'All'}</span>
          <button class="btn-view" onclick="addToPath('${r.id}','${r.title.replace(/'/g,'').replace(/"/g,'')}')">+ Add to Path</button>
        </div>
      </div>
    </div>
  `).join('');
}

function addToPath(id, title) {
  const draft = JSON.parse(localStorage.getItem('pathways-draft') || '{"nodes":[]}');
  const res = RESOURCES.find(r=>r.id===id);
  if (!draft.nodes.find(n=>n.id===id)) {
    draft.nodes.push({id, title: res.title, desc: res.desc, icon: '📖', tags: res.tags, nodeType:'resource', type:'resource'});
    localStorage.setItem('pathways-draft', JSON.stringify(draft));
    alert(title + ' added to your path!');
  } else {
    alert('Already in your path.');
  }
}

renderRes();
</script>
</body>
</html>
