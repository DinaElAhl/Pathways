<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Resources — Pathways</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="data-frameworks.js"></script>
  <script src="data-apps.js"></script>
  <script src="data-resources.js"></script>
  <script src="data-apps-stages.js"></script>
  <script src="data-frameworks-stages.js"></script>
  <script src="data.js"></script>
  <style>
  .page-hero{padding:clamp(48px,8vw,96px) var(--gutter) clamp(40px,6vw,72px);text-align:center;background:var(--grad-soft);border-bottom:1px solid var(--border)}
  .page-hero h1{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.25rem);font-weight:700;line-height:1.15;margin:0 0 .75rem}
  .page-hero h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .page-hero p{color:var(--text-muted);font-size:clamp(.95rem,2vw,1.1rem);max-width:540px;margin:0 auto}
  .page-wrap{max-width:var(--max);margin:0 auto;padding:2rem var(--gutter)}
  .filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem;align-items:center}
  .fpill{padding:.4rem 1rem;border-radius:999px;border:1.5px solid var(--border);background:var(--bg-elev);font-size:.82rem;font-weight:700;color:var(--text-muted);cursor:pointer;transition:.15s}
  .fpill:hover{border-color:var(--brand-1);color:var(--brand-1)}
  .fpill.on{background:var(--grad);color:#fff;border-color:transparent}
  .srch-inp{padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:10px;font-size:.875rem;width:220px;background:var(--bg-elev);color:var(--text)}
  .srch-inp:focus{border-color:var(--brand-1);outline:none;box-shadow:0 0 0 3px rgba(124,92,255,.12)}
  .res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .res-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:border-color .15s}
  .res-card:hover{border-color:var(--border-strong)}
  .res-badges{display:flex;gap:6px;margin-bottom:8px}
  .res-title{font-family:var(--font-display);font-weight:700;font-size:17px;margin:0}
  .res-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:10px}
  .app-tag{padding:.12rem .5rem;border-radius:999px;font-size:.72rem;font-weight:700;background:rgba(124,92,255,.1);color:var(--brand-1)}
  .res-rel{font-size:13px;margin-bottom:8px}
  .res-rel strong{color:var(--text);margin-right:4px}
  .res-actions{margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
  .count-tag{font-size:.82rem;font-weight:700;color:var(--brand-1)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s,transform .3s;z-index:999;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <script src="nav.js"></script>

  <section class="page-hero" id="main-content">
    <h1>Guides, templates &amp; <em>resources</em></h1>
    <p>Downloadable assets, reference cards, and video walkthroughs — tagged to frameworks and apps.</p>
  </section>

  <div class="page-wrap">
    <div class="filter-bar" id="type-filters"></div>
    <div class="filter-bar" id="level-filters"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <input class="srch-inp" id="res-search" placeholder="Search resources…" type="search">
      <span class="count-tag" id="res-count"></span>
    </div>
    <div class="res-grid" id="res-grid"></div>
  </div>

  <script src="resources-app.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
