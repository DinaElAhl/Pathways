<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Frameworks — Pathways</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="data-frameworks.js"></script>
  <script src="data-apps.js"></script>
  <script src="data-resources.js"></script>
  <script src="data-apps-stages.js"></script>
  <script src="data-frameworks-stages.js"></script>
  <script src="data.js"></script>
  <style>
  .page-hero{padding:clamp(48px,8vw,96px) var(--gutter) clamp(40px,6vw,72px);text-align:center;background:var(--grad-soft);border-bottom:1px solid var(--border)}
  .page-hero h1{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.25rem);font-weight:700;line-height:1.15;margin:0 0 .75rem}
  .page-hero h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .page-hero p{color:var(--text-muted);font-size:clamp(.95rem,2vw,1.1rem);max-width:540px;margin:0 auto}
  .page-wrap{max-width:var(--max);margin:0 auto;padding:2rem var(--gutter)}
  .filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;align-items:center}
  .fpill{padding:.4rem 1rem;border-radius:999px;border:1.5px solid var(--border);background:var(--bg-elev);font-size:.82rem;font-weight:700;color:var(--text-muted);cursor:pointer;transition:.15s}
  .fpill:hover{border-color:var(--brand-1);color:var(--brand-1)}
  .fpill.on{background:var(--grad);color:#fff;border-color:transparent}
  .srch-inp{padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:10px;font-size:.875rem;width:220px;background:var(--bg-elev);color:var(--text);margin-left:auto}
  .srch-inp:focus{border-color:var(--brand-1);outline:none;box-shadow:0 0 0 3px rgba(124,92,255,.12)}
  .fw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .fw-item{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:border-color .15s}
  .fw-item:hover{border-color:var(--border-strong)}
  .fw-summary{display:flex;justify-content:space-between;align-items:start;gap:14px;padding:20px;cursor:pointer}
  .fw-summary .acc-chevron{transition:transform .2s}
  .fw-open .acc-chevron{transform:rotate(180deg);color:var(--brand-1)}
  .fw-name{font-family:var(--font-display);font-weight:700;font-size:18px;margin:6px 0 0}
  .fw-detail{padding:0 20px 20px;border-top:1px solid var(--border);animation:accFade .2s ease}
  .fw-detail h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin:16px 0 8px}
  .fw-pillar{margin-bottom:6px}
  .fw-pillar summary{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:14px;background:var(--grad-soft)}
  .fw-pillar p{padding:4px 12px 8px;margin:0;font-size:13.5px;color:var(--text-muted)}
  .count-tag{font-size:.82rem;font-weight:700;color:var(--brand-1);margin-left:8px}
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <script src="nav.js"></script>

  <section class="page-hero" id="main-content">
    <h1>The <em>knowledge map</em> behind Pathways</h1>
    <p>A navigator, not a tutorial. For each framework: what it is, when it applies, where Pathways supports it.</p>
  </section>

  <div class="page-wrap">
    <div class="filter-bar" id="fw-filters"></div>
    <input class="srch-inp" id="fw-search" placeholder="Search frameworks…" type="search">
    <div style="margin:12px 0 16px"><span class="count-tag" id="fw-count"></span></div>
    <div class="fw-grid" id="fw-grid"></div>
  </div>

  <script src="frameworks-app.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
